<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Chat</title>
</head>
<body>

  <div id="messages"></div>

  <input id="input" type="text" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
  <button id="recordBtn">Hold to Record</button>

  <hr />
  <input id="callTarget" placeholder="Username to call..." />
  <button onclick="startCall()">Call</button>
  <button onclick="endCall()">Hang Up</button>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    const username = prompt('Enter your username:') || 'Anonymous';

    const socket = io('https://chat-g9td.onrender.com');

    socket.on('chat', function(data) {
      const div = document.createElement('div');

      if (data.audio) {
        // Voice message — create a playable audio element
        const audio = document.createElement('audio');
        audio.src = data.audio;
        audio.controls = true;
        div.textContent = data.username + ': ';
        div.appendChild(audio);
      } else {
        div.textContent = data.username + ': ' + data.text;
      }

      document.getElementById('messages').appendChild(div);
    });

    function sendMessage() {
      const input = document.getElementById('input');
      if (input.value.trim() === '') return;

      socket.emit('chat', { username: username, text: input.value });
      input.value = '';
    }

    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    // Voice message recording
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById('recordBtn');

    recordBtn.addEventListener('mousedown', async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          // reader.result is a base64 audio string
          socket.emit('chat', { username: username, audio: reader.result });
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t => t.stop()); // release mic
      };

      mediaRecorder.start();
      recordBtn.textContent = 'Recording...';
    });

    recordBtn.addEventListener('mouseup', () => {
      mediaRecorder.stop();
      recordBtn.textContent = 'Hold to Record';
    });

    // Live call using PeerJS
    // Peer ID = username with spaces replaced (PeerJS doesn't allow spaces)
    const peerId = username.replace(/\s+/g, '_').toLowerCase();
    const peer = new Peer(peerId);

    let currentCall = null;

    // Someone is calling you — show a confirm popup
    peer.on('call', (call) => {
      if (confirm(`Incoming call from ${call.peer}. Accept?`)) {
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          call.answer(stream);
          call.on('stream', (remoteStream) => playAudio(remoteStream));
          currentCall = call;
        });
      } else {
        call.close();
      }
    });

    function startCall() {
      const target = document.getElementById('callTarget').value.trim().replace(/\s+/g, '_').toLowerCase();
      if (!target) return;

      navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
        const call = peer.call(target, stream);
        call.on('stream', (remoteStream) => playAudio(remoteStream));
        currentCall = call;
      });
    }

    function endCall() {
      if (currentCall) {
        currentCall.close();
        currentCall = null;
      }
    }

    function playAudio(stream) {
      const audio = new Audio();
      audio.srcObject = stream;
      audio.play();
    }
  </script>

</body>
</html>
